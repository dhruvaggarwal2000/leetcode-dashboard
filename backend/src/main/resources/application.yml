spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/leetcode_db
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  web:
    cors:
      allowed-origins: http://localhost:5173
  mvc:
    async:
      request-timeout: 300000

server:
  port: 8080

leetcode:
  api:
    base-url: https://leetcode.com
    problems-base-url: https://leetcode.com/problems/

app:
  chat:
    enabled: true
    # provider: cli  -> shells out to the locally installed `claude` CLI (default)
    # provider: api  -> calls the Anthropic Messages API directly with app.chat.anthropic.api-key
    provider: cli
    cli:
      # Model alias passed to `claude --model`. Accepts `sonnet`, `opus`, `haiku`, or a full model ID.
      model: sonnet
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-6
      max-tokens: 4096
      base-url: https://api.anthropic.com
